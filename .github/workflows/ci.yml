name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npx jest --no-coverage --forceExit

      - name: Check Expo config
        run: npx expo config --type public
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: test
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_DATABASE_URL: https://test.firebasedatabase.app
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: test
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: test.appspot.com
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: test
          EXPO_PUBLIC_FIREBASE_APP_ID: test
          EXPO_PUBLIC_GOOGLE_CLOUD_VISION_API_KEY: test

      - name: Export web bundle (build check)
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: test
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_DATABASE_URL: https://test.firebasedatabase.app
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: test
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: test.appspot.com
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: test
          EXPO_PUBLIC_FIREBASE_APP_ID: test
          EXPO_PUBLIC_GOOGLE_CLOUD_VISION_API_KEY: test
